# USB4/Thunderbolt module options for Surface Laptop 7 (Snapdragon X Elite)
# Qualcomm USB4 uses the upstream Thunderbolt driver (not the Intel TBT stack).

# thunderbolt: enable USB4 v1.0 operation mode
# nhi_ids list includes Qualcomm USB4 NHI IDs (added upstream in 6.11)
options thunderbolt iommu=1

# typec: Type-C port manager for USB-C Alt Mode (DP, USB4)
# Needed for Surface Laptop 7's two USB4 ports
install typec /sbin/modprobe --ignore-install typec && /sbin/modprobe typec_ucsi
